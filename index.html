<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audio Visualizer - Master Edition (ver 2 - Vortex Mượt & Rừng Đom Đóm)</title>

    <!-- Thư viện bên thứ 3 (CDN) - giữ nguyên như bản gốc -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- CSS tách riêng -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="text-white h-screen flex flex-col relative overflow-hidden bg-[#000000]">

    <video id="bg-video" loop muted playsinline></video>

    <!-- Canvas WebGL (Three.js - Vortex Engine) -->
    <canvas id="webgl-canvas" class="opacity-0 transition-opacity duration-700"></canvas>
    <!-- Canvas 2D (toàn bộ các hiệu ứng visualizer khác) -->
    <canvas id="visualizer" class="opacity-0 transition-opacity duration-700"></canvas>

    <!-- Nơi các "component" HTML (xem js/components/) sẽ được lắp vào lúc khởi động -->
    <div id="app-root"></div>

    <input type="file" id="audio-upload" accept=".mp3,audio/mp3,audio/mpeg,audio/wav,audio/*" multiple>
    <audio id="audio-player" style="display: none;" playsinline></audio>

    <!-- =====================================================================
         1) COMPONENTS: mỗi file chỉ định nghĩa một biến TPL_* chứa chuỗi HTML.
            Chưa có gì được vẽ ra DOM ở bước này.
         ===================================================================== -->
    <script src="js/components/loading-shield.js"></script>
    <script src="js/components/playlist-view.js"></script>
    <script src="js/components/visualizer-overlay.js"></script>
    <script src="js/components/subtitle-modal.js"></script>
    <script src="js/components/bottom-player.js"></script>
    <script src="js/components/settings-drawer.js"></script>

    <!-- =====================================================================
         2) MAIN (bootstrap): lắp toàn bộ component vào #app-root.
            Sau dòng này, mọi phần tử (id="...") trong các component đã tồn tại
            thật sự trong DOM và có thể dùng document.getElementById an toàn.
         ===================================================================== -->
    <script src="js/main.js"></script>

    <!-- =====================================================================
         3) CORE: logic nghiệp vụ. PHẢI nạp sau bước (2).
            Thứ tự dưới đây giữ đúng thứ tự phụ thuộc / thứ tự xuất hiện gốc.
         ===================================================================== -->
    <script src="js/core/config.js"></script>
    <script src="js/core/dom-refs.js"></script>
    <script src="js/core/three-vortex.js"></script>
    <script src="js/core/state-and-video-bg.js"></script>
    <script src="js/core/subtitles.js"></script>
    <script src="js/core/equalizer-settings.js"></script>
    <script src="js/core/subtitle-display.js"></script>
    <script src="js/core/wakelock.js"></script>
    <script src="js/core/color-utils.js"></script>
    <script src="js/core/canvas-scene-setup.js"></script>
    <script src="js/core/playlist.js"></script>
    <script src="js/core/player-controls.js"></script>
    <script src="js/core/audio-engine.js"></script>
    <script src="js/core/audio-analysis.js"></script>
    <script src="js/core/rubik-math.js"></script>

    <!-- =====================================================================
         4) VISUALIZERS: các hàm vẽ canvas dùng chung + vòng lặp render chính.
         ===================================================================== -->
    <script src="js/visualizers/draw-helpers.js"></script>
    <script src="js/visualizers/draw-visualizer.js"></script>

</body>
</html>
