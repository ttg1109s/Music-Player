    <!-- =====================================================================
         KIẾN TRÚC /event/ (thử nghiệm) — NẠP CUỐI CÙNG TUYỆT ĐỐI, SAU TẤT CẢ js/* (kể cả
         js/visualizers/*). Lý do: mọi router/workflow ở đây CHỈ GỌI LẠI các hàm core đã được
         định nghĩa từ toàn bộ khối js/* phía trên — không có lý do gì để bất kỳ file js/* nào
         phải biết tới /event/ tồn tại, nên /event/ luôn đứng sau, không chen vào giữa.
         An toàn về thứ tự: mọi <script> thường (không async/defer) chạy ĐỒNG BỘ đúng thứ tự xuất
         hiện — draw-visualizer.js (ngay trên) chỉ ĐĂNG KÝ 'DOMContentLoaded' (chưa CHẠY logic bên
         trong), nên các dòng eventBus.register(...) dưới đây luôn hoàn tất TRƯỚC KHI
         'DOMContentLoaded' thực sự bắn ra và bất kỳ logic khởi động nào của app được gọi.

         THỨ TỰ NỘI BỘ trong khối này, đúng quy tắc đã thống nhất — "Workflow nạp trước -> router
         đăng ký tiếp -> listener ở cuối, vì các function đã nạp trước đó":
           1. event/bus.js             — TỔNG ĐÀI, phải có trước để router gọi register() được.
              (event/store.js KHÔNG nằm trong khối này — đã nạp SỚM hơn nhiều, ngay sau
              core/config.js, vì playlist/actions.js [core] cần `new EventStore(...)` ngay lúc
              nạp. Xem comment chi tiết ở dòng nạp event/store.js phía trên.)
           2. event/workflow/*.js      — chuỗi gọi hàm core, PHẢI có trước vì router gọi vào đó.
           3. event/router/*.js        — đăng ký với bus (eventBus.register(...)) NGAY lúc nạp.
           4. event/listener/*.js      — addEventListener cuối cùng, vì cần eventBus.send() (1) và
